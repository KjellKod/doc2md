name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm manual deployment from main'
        required: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.confirm == 'deploy')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Build and copy core tarball for Pages
        run: |
          npm run build --workspace=@doc2md/core
          npm run pack:local --workspace=@doc2md/core > "$RUNNER_TEMP/pack-output.txt"
          cat "$RUNNER_TEMP/pack-output.txt"
          node --input-type=module -e 'import { copyFileSync, readFileSync, writeFileSync } from "node:fs"; const output = readFileSync(process.argv[1], "utf8"); const jsonStart = output.indexOf("{"); if (jsonStart < 0) { throw new Error(`Could not find pack JSON in output:\n${output}`); } const packResult = JSON.parse(output.slice(jsonStart)); copyFileSync(packResult.tarballPath, `dist/${packResult.filename}`); writeFileSync("dist/latest-tarball.json", `${JSON.stringify({ filename: packResult.filename, version: packResult.version }, null, 2)}\n`, "utf8");' "$RUNNER_TEMP/pack-output.txt"
      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory dist \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .
      - uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
