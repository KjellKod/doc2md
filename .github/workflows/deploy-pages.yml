name: Deploy to GitHub Pages

run-name: "Release/Deployment: ${{ inputs.ref || github.ref_name }}"

on:
  push:
    tags: ["[0-9]*.[0-9]*.[0-9]*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch/ref to validate or deploy"
        required: true
        type: string

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  classify-ref:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      candidate_ref: ${{ steps.resolve.outputs.candidate_ref }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      is_release: ${{ steps.resolve.outputs.is_release }}
      release_version: ${{ steps.resolve.outputs.release_version }}
    steps:
      - name: Authorize manual deploy (owner only)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          (github.actor != 'KjellKod' || github.triggering_actor != 'KjellKod')
        run: |
          echo "::error::Manual deploy is restricted to the repository owner (KjellKod). Triggering actor '${{ github.triggering_actor }}' (initial actor '${{ github.actor }}') is not authorized. Re-runs preserve the original actor, so triggering_actor is checked too."
          exit 1
      - id: resolve
        env:
          INPUT_REF: ${{ github.event.inputs.ref || '' }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            checkout_ref="${GITHUB_REF}"
            candidate_ref="${GITHUB_REF#refs/tags/}"
          else
            checkout_ref="${INPUT_REF}"
            candidate_ref="${INPUT_REF#refs/tags/}"
          fi

          should_build="false"
          release_version=""
          is_release="false"
          if printf '%s' "$candidate_ref" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            is_release="true"
            release_version="${candidate_ref}"
            should_build="true"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            should_build="true"
          fi

          {
            echo "checkout_ref=${checkout_ref}"
            echo "candidate_ref=${candidate_ref}"
            echo "should_build=${should_build}"
            echo "is_release=${is_release}"
            echo "release_version=${release_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Explain ignored non-release tag pushes
        if: github.event_name == 'push' && steps.resolve.outputs.should_build != 'true'
        run: |
          echo "::notice::Tag '${{ steps.resolve.outputs.candidate_ref }}' does not match release format X.Y.Z. Skipping checkout, build, and deploy."

  build:
    needs: classify-ref
    if: needs.classify-ref.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ needs.classify-ref.outputs.should_build }}
      is_release: ${{ needs.classify-ref.outputs.is_release }}
      release_version: ${{ needs.classify-ref.outputs.release_version }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.classify-ref.outputs.checkout_ref }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
      - name: Explain non-release manual runs
        if: needs.classify-ref.outputs.is_release != 'true'
        run: |
          echo "::notice::Ref '${{ needs.classify-ref.outputs.candidate_ref }}' is not a release tag. Building a -dev artifact and deploying it to the live GitHub Pages site (manual override). The next release will re-deploy production."
      - name: Validate release tag checkout
        if: needs.classify-ref.outputs.is_release == 'true'
        run: |
          if ! git tag --points-at HEAD | grep -Fx "${{ needs.classify-ref.outputs.release_version }}" >/dev/null; then
            echo "::error::Expected checked-out commit to include release tag '${{ needs.classify-ref.outputs.release_version }}'."
            exit 1
          fi
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Build and copy core tarball for Pages
        env:
          # Strict only for real releases; manual branch deploys pack a -dev tarball.
          REQUIRE_RELEASE_TAG: ${{ needs.classify-ref.outputs.is_release }}
        run: |
          npm run build --workspace=@doc2md/core
          npm run pack:local --workspace=@doc2md/core > "$RUNNER_TEMP/pack-output.txt"
          cat "$RUNNER_TEMP/pack-output.txt"
          node --input-type=module -e 'import { copyFileSync, readFileSync, writeFileSync } from "node:fs"; const output = readFileSync(process.argv[1], "utf8"); const packInfoMatch = output.match(/\{\s*"version"[\s\S]*\}\s*$/); if (!packInfoMatch) { throw new Error(`Could not parse pack JSON in output:\n${output}`); } const packResult = JSON.parse(packInfoMatch[0]); copyFileSync(packResult.tarballPath, `dist/${packResult.filename}`); copyFileSync(`dist/${packResult.filename}`, "dist/doc2md-core-latest.tgz"); writeFileSync("dist/latest-tarball.json", `${JSON.stringify({ filename: packResult.filename, latest: "doc2md-core-latest.tgz", version: packResult.version }, null, 2)}\n`, "utf8");' "$RUNNER_TEMP/pack-output.txt"
      - name: Package skill bundle for Pages
        run: |
          cd .skills/doc2md
          zip -r ../../dist/doc2md-skill.skill \
            SKILL.md package.json examples/ scripts/
          echo "Skill bundle: $(ls -la ../../dist/doc2md-skill.skill)"
      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory dist \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    if: needs.build.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
