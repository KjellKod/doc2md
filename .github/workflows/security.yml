name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Opt GitHub JavaScript actions into Node 24 now to remove Node 20 deprecation warnings.
# Remove this after GitHub switches Node 24 to the default action runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          chmod +x /tmp/gitleaks

      - name: Run gitleaks
        run: |
          /tmp/gitleaks dir . \
            --redact \
            --exit-code 2 \
            --report-format sarif \
            --report-path results.sarif

  workflow-guard:
    name: workflow-guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow security guard
        run: python3 scripts/security_ci_guard.py
