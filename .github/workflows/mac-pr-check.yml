name: Mac PR check

"on":
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: mac-pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  mac-pr-check:
    name: mac-pr-check
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop web bundle
        run: npm run build:desktop

      - name: Make Mac build helper executable
        run: chmod +x scripts/build-mac-app.sh

      - name: Build unsigned Mac app (Release) + allowlist scan
        run: bash scripts/build-mac-app.sh --configuration Release --allow-development-license-key-for-pr

      - name: Upload unsigned .app artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: doc2md-unsigned-app
          path: .build/mac/Build/Products/Release/doc2md.app
          if-no-files-found: error
          retention-days: 7
