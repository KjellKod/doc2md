name: Mac PR check

"on":
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: mac-pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  mac-pr-check:
    name: mac-pr-check
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build desktop web bundle
        run: npm run build:desktop

      - name: Make Mac build helper executable
        run: chmod +x scripts/build-mac-app.sh

      - name: Build unsigned Mac app (Release) + allowlist scan
        run: bash scripts/build-mac-app.sh --configuration Release --allow-development-license-key-for-pr

      - name: Upload unsigned .app artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: doc2md-unsigned-app
          path: .build/mac/Build/Products/Release/doc2md.app
          if-no-files-found: error
          retention-days: 7
