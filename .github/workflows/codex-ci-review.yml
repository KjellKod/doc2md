name: Codex CI Code Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == 'KjellKod' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: codex-ci-review
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check API key availability
        id: check-key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not available. Skipping review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather PR context
        if: steps.check-key.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Exclude binary and non-reviewable files from the diff
          gh pr diff ${{ github.event.pull_request.number }} --patch \
            --exclude '*.pdf' \
            --exclude '*.docx' \
            --exclude '*.xlsx' \
            --exclude '*.pptx' \
            --exclude '*.tgz' \
            --exclude '*.png' \
            --exclude '*.jpg' \
            --exclude '*.gif' \
            --exclude '*.ico' \
            --exclude '*.woff' \
            --exclude '*.woff2' \
            --exclude '*.ttf' \
            > /tmp/pr.diff
          gh pr view ${{ github.event.pull_request.number }} \
            --json title,body --jq '.title + "\n\n" + (.body // "")' > /tmp/pr_description.txt
          gh pr view ${{ github.event.pull_request.number }} \
            --json headRefOid --jq '.headRefOid' > /tmp/pr_head_sha.txt
          gh pr view ${{ github.event.pull_request.number }} \
            --json files --jq '.files[].path' > /tmp/changed_files_raw.txt

          # Filter binary extensions from changed files list
          grep -vE '\.(pdf|docx|xlsx|pptx|tgz|png|jpg|gif|ico|woff|woff2|ttf)$' \
            /tmp/changed_files_raw.txt > /tmp/changed_files.txt || true

          DIFF_BYTES=$(wc -c < /tmp/pr.diff)
          DIFF_LINES=$(wc -l < /tmp/pr.diff)
          echo "::notice::Diff size: ${DIFF_BYTES} bytes, ${DIFF_LINES} lines"
          echo "::notice::Reviewable files: $(wc -l < /tmp/changed_files.txt)"

          # Cap diff size to avoid overwhelming the model (keep first ~100KB)
          MAX_DIFF_BYTES=100000
          if [ "$DIFF_BYTES" -gt "$MAX_DIFF_BYTES" ]; then
            echo "::warning::Diff is ${DIFF_BYTES} bytes, truncating to ${MAX_DIFF_BYTES} bytes"
            head -c "$MAX_DIFF_BYTES" /tmp/pr.diff > /tmp/pr.diff.truncated
            # Append a note about truncation
            printf '\n\n--- DIFF TRUNCATED (original: %s bytes, showing first %s bytes) ---\n' \
              "$DIFF_BYTES" "$MAX_DIFF_BYTES" >> /tmp/pr.diff.truncated
            mv /tmp/pr.diff.truncated /tmp/pr.diff
          fi

          HEAD_SHA="$(cat /tmp/pr_head_sha.txt)"
          gh api \
            -H "Accept: application/vnd.github.raw" \
            "repos/$REPO/contents/scripts/build_pr_head_files.py?ref=$HEAD_SHA" \
            > /tmp/build_pr_head_files.py

          python3 /tmp/build_pr_head_files.py \
            --repo "$REPO" \
            --head-sha-file /tmp/pr_head_sha.txt \
            --changed-files-file /tmp/changed_files.txt \
            --output /tmp/pr_head_files.md

      - name: Fetch existing review comments and replies
        if: steps.check-key.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --paginate --slurp "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments" \
            --jq 'map(.[]) | map({id, in_reply_to_id, user: .user.login, path, line, body})' \
            > /tmp/existing_comments.json 2>/dev/null || echo "[]" > /tmp/existing_comments.json

      - name: Build review prompt
        if: steps.check-key.outputs.skip != 'true'
        run: |
          sed -e '/{PLACEHOLDER_PR_DESCRIPTION}/r /tmp/pr_description.txt' \
              -e '/{PLACEHOLDER_PR_DESCRIPTION}/d' \
              -e '/{PLACEHOLDER_EXISTING_COMMENTS}/r /tmp/existing_comments.json' \
              -e '/{PLACEHOLDER_EXISTING_COMMENTS}/d' \
              -e '/{PLACEHOLDER_PR_HEAD_FILES}/r /tmp/pr_head_files.md' \
              -e '/{PLACEHOLDER_PR_HEAD_FILES}/d' \
              -e '/{PLACEHOLDER_DIFF}/r /tmp/pr.diff' \
              -e '/{PLACEHOLDER_DIFF}/d' \
              .github/codex-review-prompt.md > /tmp/review-prompt.md

      - name: Install Codex CLI and sandbox deps
        if: steps.check-key.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq bubblewrap >/dev/null 2>&1 || true
          npm install -g @openai/codex

      - name: Authenticate Codex CLI
        if: steps.check-key.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          printenv OPENAI_API_KEY | codex login --with-api-key
          codex login status

      - name: AI Code Review
        if: steps.check-key.outputs.skip != 'true'
        id: review
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROMPT_SIZE=$(wc -c < /tmp/review-prompt.md)
          PROMPT_LINES=$(wc -l < /tmp/review-prompt.md)
          echo "::notice::Review prompt: ${PROMPT_SIZE} bytes, ${PROMPT_LINES} lines"

          # Give Codex up to 5 minutes to review
          CODEX_EXIT=0
          timeout 300 codex exec \
            --sandbox read-only \
            --output-last-message /tmp/review-output.json \
            - < /tmp/review-prompt.md || CODEX_EXIT=$?

          if [ "$CODEX_EXIT" -eq 124 ]; then
            echo "::error::Codex timed out after 300 seconds. Prompt was ${PROMPT_SIZE} bytes. Consider reducing diff size or increasing timeout."
          elif [ "$CODEX_EXIT" -ne 0 ]; then
            echo "::error::Codex exited with code $CODEX_EXIT"
          fi

          if [ -s /tmp/review-output.json ]; then
            OUTPUT_SIZE=$(wc -c < /tmp/review-output.json)
            echo "::notice::Review output: ${OUTPUT_SIZE} bytes"
          else
            echo "::error::No review output produced. Codex exit code: $CODEX_EXIT, prompt size: ${PROMPT_SIZE} bytes"
          fi

      - name: Post inline review
        if: always() && steps.check-key.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          STRICT_INLINE_POSTING: "false"
        run: |
          if [ ! -s /tmp/review-output.json ]; then
            echo "::warning::No AI review output file produced. Skipping inline review posting."
            exit 0
          fi

          python3 << 'PYEOF'
          import json
          import os
          import re
          import subprocess
          import sys

          raw = open("/tmp/review-output.json", encoding="utf-8").read()
          comments = None
          stripped = raw

          try:
              parsed = json.loads(raw)
              if isinstance(parsed, list):
                  comments = parsed
          except (json.JSONDecodeError, ValueError):
              pass

          if comments is None:
              stripped = re.sub(r"```[\w]*\n?", "", raw)
              try:
                  parsed = json.loads(stripped.strip())
                  if isinstance(parsed, list):
                      comments = parsed
              except (json.JSONDecodeError, ValueError):
                  pass

          if comments is None:
              for fence_match in re.finditer(r"```(?:json)?\s*\n(.*?)```", raw, re.DOTALL):
                  try:
                      parsed = json.loads(fence_match.group(1))
                      if isinstance(parsed, list):
                          comments = parsed
                          break
                  except (json.JSONDecodeError, ValueError):
                      continue

          if comments is None:
              for match in re.finditer(r"\[.*?\]", stripped, re.DOTALL):
                  try:
                      candidate = json.loads(match.group())
                      if isinstance(candidate, list):
                          comments = candidate
                          break
                  except (json.JSONDecodeError, ValueError):
                      continue

          if comments is None:
              print("No review comments -- could not parse JSON array from output.")
              sys.exit(0)

          if not isinstance(comments, list) or not comments:
              print("No review comments.")
              sys.exit(0)

          def is_valid_comment(comment):
              if not isinstance(comment, dict):
                  return False
              if not (isinstance(comment.get("path"), str) and comment["path"]):
                  return False
              if not (isinstance(comment.get("body"), str) and comment["body"]):
                  return False
              try:
                  comment["line"] = int(comment["line"])
              except (TypeError, ValueError):
                  return False
              if comment["line"] < 1:
                  return False
              if comment.get("side") not in ("LEFT", "RIGHT"):
                  comment["side"] = "RIGHT"
              return True

          comments = [comment for comment in comments if is_valid_comment(comment)]
          if not comments:
              print("No valid review comments after structural validation.")
              sys.exit(0)

          existing = []
          try:
              existing = json.load(open("/tmp/existing_comments.json", encoding="utf-8"))
          except Exception:
              pass

          bot_bodies = {
              item["body"].strip()
              for item in existing
              if isinstance(item, dict)
              and item.get("user") == "github-actions[bot]"
              and isinstance(item.get("body"), str)
          }
          replied_ids = {
              item.get("in_reply_to_id")
              for item in existing
              if isinstance(item, dict) and item.get("in_reply_to_id")
          }
          resolved_bot_ids = {
              item["id"]
              for item in existing
              if isinstance(item, dict)
              and item.get("user") == "github-actions[bot]"
              and item.get("id") in replied_ids
          }
          resolved_bot_bodies = {
              item["body"].strip()
              for item in existing
              if isinstance(item, dict)
              and item.get("user") == "github-actions[bot]"
              and item.get("id") in resolved_bot_ids
              and isinstance(item.get("body"), str)
          }

          filtered = []
          for comment in comments:
              body = comment["body"].strip()
              if body in bot_bodies or body in resolved_bot_bodies:
                  continue
              filtered.append(comment)

          if not filtered:
              print("No new review comments to post after deduplication.")
              sys.exit(0)

          failed_inline = []
          for comment in filtered:
              payload = {
                  "body": comment["body"],
                  "commit_id": os.environ["COMMIT_SHA"],
                  "path": comment["path"],
                  "line": comment["line"],
                  "side": comment.get("side", "RIGHT"),
              }
              result = subprocess.run(
                  [
                      "gh",
                      "api",
                      f"repos/{os.environ['REPO']}/pulls/{os.environ['PR_NUMBER']}/comments",
                      "--method",
                      "POST",
                      "--input",
                      "-",
                  ],
                  input=json.dumps(payload),
                  text=True,
                  capture_output=True,
              )
              if result.returncode != 0:
                  print(f"::warning::Failed to post inline comment on {comment['path']}:{comment['line']}: {result.stderr.strip()}")
                  failed_inline.append(comment)

          # Fall back: post failed inline comments as a single issue comment
          if failed_inline:
              body_parts = ["## Codex Review (inline posting failed)\n"]
              for c in failed_inline:
                  body_parts.append(f"**{c['path']}:{c['line']}**\n{c['body']}\n")
              fallback_body = "\n".join(body_parts)
              subprocess.run(
                  [
                      "gh",
                      "pr",
                      "comment",
                      os.environ["PR_NUMBER"],
                      "--body",
                      fallback_body,
                  ],
                  text=True,
                  check=False,
              )
              print(f"::notice::Posted {len(failed_inline)} comment(s) as PR comment (inline posting failed)")
          PYEOF
